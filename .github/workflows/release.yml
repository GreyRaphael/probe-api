name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binaries
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          LDFLAGS="-s -w -X main.version=${TAG}"
          mkdir -p dist

          targets=(
            "linux   amd64"
            "linux   arm64"
            "darwin  amd64"
            "darwin  arm64"
            "windows amd64"
          )

          for target in "${targets[@]}"; do
            read -r os arch <<< "$target"
            ext=""
            if [ "$os" = "windows" ]; then ext=".exe"; fi
            output="probe-api-${os}-${arch}${ext}"
            echo "Building ${output} ..."
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build -ldflags "$LDFLAGS" -o "dist/${output}" .
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/probe-api-*
            dist/checksums.txt
