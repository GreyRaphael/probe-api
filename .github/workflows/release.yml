name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build and package
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          LDFLAGS="-s -w -X main.version=${TAG}"

          targets=(
            "linux   amd64  tar.gz"
            "linux   arm64  tar.gz"
            "darwin  amd64  tar.gz"
            "darwin  arm64  tar.gz"
            "windows amd64  zip"
          )

          for target in "${targets[@]}"; do
            read -r os arch fmt <<< "$target"

            bin_name="probe-api"
            if [ "$os" = "windows" ]; then bin_name="probe-api.exe"; fi

            archive="probe-api-${os}-${arch}.${fmt}"
            echo "Building ${archive} ..."

            CGO_ENABLED=0 GOOS=$os GOARCH=$arch \
              go build -ldflags "$LDFLAGS" -o "${bin_name}" .

            if [ "$fmt" = "tar.gz" ]; then
              tar czf "${archive}" "${bin_name}"
            else
              zip "${archive}" "${bin_name}"
            fi

            rm -f "${bin_name}"
          done

      - name: Generate checksums
        run: |
          sha256sum probe-api-*.tar.gz probe-api-*.zip > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            probe-api-*.tar.gz
            probe-api-*.zip
            checksums.txt
